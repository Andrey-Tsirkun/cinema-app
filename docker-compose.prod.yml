# Production stack for VPS (aligned with crm / scheduler prod compose).
#
# - Postgres: no host port — only reachable as hostname "postgres" on the Docker network.
# - Backend / frontend: published on 127.0.0.1 only; expose to the internet via host Nginx (TLS + proxy).
#
# Usage:
#   cp .env.example .env
#   Set POSTGRES_PASSWORD, JWT_SECRET, FRONTEND_ORIGIN, NEXT_PUBLIC_API_URL (public URLs).
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Rebuild frontend after changing NEXT_PUBLIC_API_URL (baked in at build time).

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cinema}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-cinema}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.prod
    restart: always
    ports:
      - '127.0.0.1:4000:4000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cinema}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cinema}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:?FRONTEND_ORIGIN must be set}
      PORT: 4000
      TRUST_PROXY: ${TRUST_PROXY:-true}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:4000/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL must be set}
    restart: always
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode >= 200 && r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  postgres_data:
